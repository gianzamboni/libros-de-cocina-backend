services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: libros_de_cocina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/libros_de_cocina?schema=public
      PORT: 3001
      NODE_ENV: development
      UPLOAD_DIR: ./uploads
      # tsx watch relies on chokidar; bind-mounted file events from a Windows
      # host don't always reach inotify inside the container, so poll instead.
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "pnpm prisma:generate &&
             npx prisma migrate deploy &&
             pnpm seed &&
             pnpm dev"

volumes:
  postgres_data:
  node_modules:
